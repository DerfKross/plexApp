<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlexApp</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>PlexApp</h1>
          <p>Search approved sources, send downloads to qBittorrent, and scan Plex.</p>
        </div>
        <button id="refreshButton" class="icon-button" title="Refresh download progress" aria-label="Refresh download progress">
          <span aria-hidden="true">R</span>
        </button>
      </header>

      <section class="control-band">
        <form id="searchForm" class="search-form">
          <div class="sticky-search">
            <div id="searchDockPlaceholder" class="search-dock-placeholder" aria-hidden="true"></div>
            <div class="search-row">
              <input id="queryInput" type="search" placeholder="Search title" autocomplete="off" />
              <button type="submit">Search</button>
            </div>
            <div class="feed-actions">
              <button id="browseRssButton" type="button">Browse RSS</button>
            </div>
            <div id="rssSourceButtons" class="source-buttons hidden" aria-label="RSS feeds"></div>
          </div>
        </form>
      </section>

      <section class="manual-band">
        <form id="directForm" class="direct-form">
          <input id="directInput" type="text" placeholder="Paste legal magnet or torrent URL" />
          <button type="submit">Add URL</button>
        </form>
      </section>

      <section class="content-grid">
        <div class="panel">
          <div class="panel-head">
            <h2>Results</h2>
            <span id="sourceStatus"></span>
          </div>
          <div id="resultsList" class="list empty">Run a search or browse RSS.</div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>Downloads</h2>
            <div class="scan-actions">
              <button id="clearDoneButton" type="button">Clear Done</button>
              <button id="scanMovieButton" type="button">Scan Movies</button>
              <button id="scanTvButton" type="button">Scan TV</button>
            </div>
          </div>
          <div id="downloadsList" class="list empty">No active downloads found.</div>
        </div>
      </section>
    </main>

    <div id="mediaDialog" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="mediaDialogTitle">
      <div class="modal-panel">
        <h2 id="mediaDialogTitle">Send as</h2>
        <p id="mediaDialogItem" class="modal-title"></p>
        <div class="modal-actions">
          <button type="button" data-media-choice="movie">Movie</button>
          <button type="button" data-media-choice="tv">TV Show</button>
          <button id="cancelMediaButton" type="button">Cancel</button>
        </div>
        <div id="tvFolderPanel" class="tv-folder-panel hidden">
          <label for="tvFolderSelect">Existing TV folder</label>
          <select id="tvFolderSelect">
            <option value="">Choose existing folder</option>
          </select>
          <label for="tvFolderInput">New show folder</label>
          <input id="tvFolderInput" type="text" placeholder="Show name" autocomplete="off" />
          <label for="tvSeasonSelect">Existing season folder</label>
          <select id="tvSeasonSelect">
            <option value="">No season subfolder</option>
          </select>
          <label for="tvSeasonInput">New season folder</label>
          <input id="tvSeasonInput" type="text" placeholder="Season 09" autocomplete="off" />
          <div class="modal-actions two">
            <button id="confirmTvFolderButton" type="button" class="primary">Add to TV</button>
            <button id="backMediaButton" type="button">Back</button>
          </div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div id="activeDownloadTray" class="active-download-tray hidden" role="status" aria-live="polite"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
